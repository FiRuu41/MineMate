name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Test (unit only)
        env:
          DEEPSEEK_API_KEY: sk-test
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: test
          MYSQL_PASSWORD: test
          MYSQL_DB: test
        run: uv run pytest -v -m "not slow and not e2e and not integration"
