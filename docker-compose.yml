services:
  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: mcmod-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mcmod-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pwd
      MYSQL_DATABASE: mcmod_qa
      MYSQL_USER: mcmod
      MYSQL_PASSWORD: mcmod_pwd
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    restart: unless-stopped
